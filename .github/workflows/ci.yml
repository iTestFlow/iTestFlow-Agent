name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: itestflow
          POSTGRES_PASSWORD: itestflow
          POSTGRES_DB: itestflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itestflow -d itestflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://itestflow:itestflow@localhost:5432/itestflow
      APP_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      SESSION_SECRET: ci-session-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run db:migrate
      - run: npm run typecheck
      - run: npm run lint

      # Let both lanes finish so the report contains the complete test run. Their
      # real outcomes are enforced after the report has been published.
      - name: Unit & coverage tests
        id: unit_tests
        continue-on-error: true
        run: npm run test:coverage

      - name: PostgreSQL integration tests
        id: integration_tests
        continue-on-error: true
        run: npm run test:integration

      - name: Validate test report files
        id: validate_test_reports
        if: ${{ always() && !cancelled() }}
        continue-on-error: true
        shell: bash
        run: |
          test -s reports/unit.xml
          test -s reports/unit.json
          test -s reports/integration.xml
          test -s reports/integration.json

      - name: Publish Vitest test report
        id: publish_test_report
        if: ${{ always() && !cancelled() }}
        continue-on-error: true
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: |
            reports/unit.xml
            reports/integration.xml
          check_name: |
            Unit & coverage
            PostgreSQL integration
          group_reports: true
          detailed_summary: false
          flaky_summary: false
          include_time_in_summary: true
          resolve_ignore_classname: true
          job_summary: true
          job_summary_text: |
            ## Vitest Test Report
            Unit/coverage and PostgreSQL integration test results.
          fail_on_failure: true
          fail_on_parse_error: true
          require_tests: true
          annotate_only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Publish test file and failure details
        id: publish_test_details
        if: ${{ always() && !cancelled() }}
        continue-on-error: true
        run: node --import tsx scripts/render-vitest-summary.ts

      - name: Enforce test and reporting results
        if: ${{ always() && !cancelled() }}
        shell: bash
        env:
          UNIT_TESTS_OUTCOME: ${{ steps.unit_tests.outcome }}
          INTEGRATION_TESTS_OUTCOME: ${{ steps.integration_tests.outcome }}
          REPORT_VALIDATION_OUTCOME: ${{ steps.validate_test_reports.outcome }}
          REPORT_PUBLISH_OUTCOME: ${{ steps.publish_test_report.outcome }}
          DETAILS_PUBLISH_OUTCOME: ${{ steps.publish_test_details.outcome }}
        run: |
          failed=0

          for result in \
            "Unit & coverage tests:$UNIT_TESTS_OUTCOME" \
            "PostgreSQL integration tests:$INTEGRATION_TESTS_OUTCOME" \
            "Test report validation:$REPORT_VALIDATION_OUTCOME" \
            "Test report publishing:$REPORT_PUBLISH_OUTCOME" \
            "Test detail publishing:$DETAILS_PUBLISH_OUTCOME"
          do
            name="${result%%:*}"
            outcome="${result##*:}"

            if [[ "$outcome" != "success" ]]; then
              echo "::error title=$name::$name finished with outcome: $outcome"
              failed=1
            fi
          done

          exit "$failed"

      - run: npm run build
